services:
  server:
    image: gymjunkie-server:latest 
    container_name: server
    build: .
    env_file:
      - ${ENV_PATH}
    volumes:
      - ./app:/server/app
    ports: 
      - "8000:8000"
  redis: 
    image: redis
    container_name: redis
    command: ["redis-server", "--requirepass", "password"]
    ports:
      - "6379:6379"
    restart: unless-stopped